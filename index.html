<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord mobile</title>
    <link rel="stylesheet" href="./style/index.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Sigmar&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container border-radius">
        <!-- Header -->
        <header>
            <img src="./img/banner.png" alt="Banner discord" class="header-image">
        </header>

        <!-- Main -->
        <main class="main text-white">

            <section class="download-section text-center">
                <h1 class="font-title uppercase">Group chat that's all fun & games</h1>
                <p class="content font-cursive">Discord is great for playing games and chilling with friends, or even
                    building a worldwide community. Customize your own space to talk, play, and hang out.</p>
                <button type="button" class="button font-cursive text-black"><i class="bi bi-cloud-download"></i>Download for Windows</button>
                <button type="button" class="button font-cursive text-white bg-blue">Open discord in your browser</button>
            </section>

            <section>
                <h1></h1>
                <p></p>
                <img src="" alt="">
                <img src="" alt="">
            </section>

            <section>
                <h1></h1>
                <p></p>
                <img src="" alt="">
                <img src="" alt="">
            </section>

        </main>
    </div>
</body>

</html>
